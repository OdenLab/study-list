name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Select GitHub Pages base path
        shell: bash
        env:
          NPM_CONFIG_AUDIT: "false"
          NPM_CONFIG_FUND: "false"
          NPM_CONFIG_PROGRESS: "false"
          NPM_CONFIG_REGISTRY: "https://registry.npmjs.org/"
        run: |
          set -o pipefail
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          npm config set registry "https://registry.npmjs.org/"
          echo "npm registry: $(npm config get registry)"

          if ! npm install --registry=https://registry.npmjs.org/ --no-audit --no-fund --loglevel=info 2>&1 | tee npm-install.log; then
            status=${PIPESTATUS[0]}
            echo "::group::npm debug logs"
            find "$HOME/.npm/_logs" -maxdepth 1 -type f -name "*.log" -print -exec cat {} \; || true
            echo "::endgroup::"
            exit "$status"
          fi

      - name: Select GitHub Pages base path
        shell: bash
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build -- --base="$BASE_PATH"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
